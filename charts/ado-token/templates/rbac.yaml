{{- $name := include "ado-token.name" . }}
{{- $credNS := include "ado-token.credentialsNamespace" . }}
{{- $outputNS := include "ado-token.outputNamespace" . }}
{{- $sameNamespace := eq $credNS $outputNS }}
{{- if $sameNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ $outputNS }}
  labels:
    {{- include "ado-token.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.credentialsSecret.name }}
      {{- if not (eq .Values.credentialsSecret.name .Values.outputSecret.name) }}
      - {{ .Values.outputSecret.name }}
      {{- end }}
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.outputSecret.name }}
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ $outputNS }}
  labels:
    {{- include "ado-token.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
{{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-credentials
  namespace: {{ $credNS }}
  labels:
    {{- include "ado-token.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.credentialsSecret.name }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-credentials
  namespace: {{ $credNS }}
  labels:
    {{- include "ado-token.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-credentials
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-output
  namespace: {{ $outputNS }}
  labels:
    {{- include "ado-token.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.outputSecret.name }}
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-output
  namespace: {{ $outputNS }}
  labels:
    {{- include "ado-token.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-output
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
