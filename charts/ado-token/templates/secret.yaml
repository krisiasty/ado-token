# Pre-creates the output secret so the helper can update it.
# The credentials secret is not managed here — it must be provided separately.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.outputSecret.name }}
  namespace: {{ include "ado-token.outputNamespace" . }}
  labels:
    {{- include "ado-token.labels" . | nindent 4 }}
type: Opaque
