image:
  repository: ghcr.io/krisiasty/ado-token
  tag: ""  # defaults to Chart.yaml appVersion
  pullPolicy: Always

# Name of the pre-existing secret containing tenant_id, client_id, client_secret.
# Creation of this secret is out of scope — provide it via kubectl, Sealed Secrets,
# External Secrets Operator, or any other mechanism.
credentialsSecret:
  name: ado-credentials
  namespace: ""  # defaults to Release namespace

# Secret that will be created and kept up to date with the bearer token.
outputSecret:
  name: ado-token
  namespace: ""  # defaults to Release namespace
  key: token

# Optional cap on the refresh interval (e.g. "30m").
# When unset, the token is refreshed at 80% of its expires_in TTL.
refreshInterval: ""

health:
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
