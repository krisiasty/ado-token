apiVersion: apps/v1
kind: Deployment
metadata:
  name: ado-token
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ado-token
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ado-token
    spec:
      serviceAccountName: ado-token
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ado-token
          image: ghcr.io/krisiasty/ado-token:latest
          env:
            - name: CREDENTIALS_SECRET_NAME
              value: ado-credentials
            - name: CREDENTIALS_SECRET_NAMESPACE
              value: argocd
            - name: OUTPUT_SECRET_NAME
              value: ado-token
            - name: OUTPUT_SECRET_NAMESPACE
              value: argocd
            # REFRESH_INTERVAL is optional, e.g. "30m" (acts as a cap on expires_in*0.8)
            # HEALTH_PORT defaults to "8080"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
