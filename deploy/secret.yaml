# Pre-created output secret. Must exist before the helper starts because
# the RBAC Role does not grant 'create' (resourceNames is incompatible with it).
# The helper will populate the 'token' key on its first successful refresh.
apiVersion: v1
kind: Secret
metadata:
  name: ado-token         # must match OUTPUT_SECRET_NAME
  namespace: argocd       # must match OUTPUT_SECRET_NAMESPACE
type: Opaque
